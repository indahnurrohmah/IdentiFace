name: Build and Deploy AI Engine to Azure

on:
  push:
    branches:
      - main # Ubah ke master jika branch utamamu namanya master

env:
  AZURE_WEBAPP_NAME: 'identiface-ai-engine' 
  FOLDER_AI: 'face-attendance'          
  PORT_AI: '8000'                          

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout GitHub Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./${{ env.FOLDER_AI }}
          file: ./${{ env.FOLDER_AI }}/Dockerfile
          push: true
          tags: ghcr.io/indahnurrohmah/identiface/ai-engine:latest

      - name: Deploy Container to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: 'ghcr.io/indahnurrohmah/identiface/ai-engine:latest'